<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | Dibyadyuti Das</title>
  <meta name="description" content="Sign in to Dibyadyuti Das's portfolio." />
  <link rel="icon" type="image/png" href="photo/ironman.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/css/login.css" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-1PS6J1ZC4N"></script>
  <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }

  <script type="text/javascript">
      (function (c, l, a, r, i, t, y) {
          c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };

          y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
      })(window, document, "clarity", "script", "w3bt5k3nsz");
  </script>
</head>
<body class="login-body">

  <main class="auth-shell">
    <div class="auth-card">
      <div class="auth-header">
        <p class="auth-eyebrow">Welcome back</p>
        <h1 class="signin-title">Sign in</h1>
        <p class="auth-subtitle">Use your email or continue with Google or GitHub.</p>
      </div>

      <form class="auth-form" id="email-login-form" novalidate>
        <div class="input-group">
          <label class="auth-label" for="email-input">Email</label>
          <input
            id="email-input"
            type="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            class="auth-input"
            required
          />
        </div>

        <div class="input-group password-group">
          <label class="auth-label" for="password-input">Password</label>
          <input
            id="password-input"
            type="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            class="auth-input"
            required
          />
          <button type="button" class="eye-toggle" id="toggle-password" aria-label="Toggle password visibility">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>

        <div class="forgot-row">
          <a href="forgot-password.html" class="forgot-link">Forgot your password?</a>
        </div>

        <div class="action-row">
          <button type="submit" id="signin-btn" class="signin-btn">Sign in</button>

          <button type="button" id="github-btn" class="social-circle" aria-label="Sign in with GitHub">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="#111">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
            </svg>
          </button>

          <button type="button" id="google-btn" class="social-circle" aria-label="Sign in with Google">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.7 2.4 30.2 0 24 0 14.8 0 7 5.4 3.2 13.3l7.9 6.1C13 13.5 18.1 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
              <path fill="#FBBC05" d="M11.1 28.7A14.9 14.9 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6l-7.9-6.1A24 24 0 0 0 0 24c0 3.9.9 7.5 2.6 10.8l8.5-6.1z"/>
              <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.7 2.2-7.7 2.2-5.9 0-11-3.9-12.8-9.3l-8.5 6.1C7 43 15 48 24 48z"/>
              <path fill="none" d="M0 0h48v48H0z"/>
            </svg>
          </button>
        </div>
      </form>

      <p class="legal-text">
        By signing in, you agree to our
        <a href="#" class="legal-link">Privacy Policy</a> and
        <a href="#" class="legal-link">User Agreement</a>
      </p>

      <p class="auth-message" id="auth-message" aria-live="polite"></p>

      <div class="signup-toggle">
        <a href="#" id="toggle-signup" class="forgot-link" style="font-size: 0.9rem;">Be a friend (Sign up if first time we meet)</a>
      </div>
    </div>
  </main>

  <script type="module" src="src/js/login.js"></script>
  <script>
    // Password toggle
    const toggleBtn = document.getElementById('toggle-password');
    const pwdInput = document.getElementById('password-input');
    
    const eyeOpenSVG = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
    const eyeClosedSVG = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';

    toggleBtn.addEventListener('click', () => {
      const isHidden = pwdInput.type === 'password';
      pwdInput.type = isHidden ? 'text' : 'password';
      toggleBtn.innerHTML = isHidden ? eyeOpenSVG : eyeClosedSVG;
      toggleBtn.style.opacity = '1';
    });
  </script>
</body>
</html>
